<app-scoreboard
  [highScore]="highScore()"
  [currentScore]="currentScore()"
  [sessionHighScore]="sessionHighScore()"
>
</app-scoreboard>

<div class="game-board">
  <div class="player">
    <p>You chose: {{ userChoice() }}</p>
  </div>
  
  <app-game-result [result]="result()"> </app-game-result>
  
  <div class="computer">
    <p>Computer chose: {{ computerChoice() }}</p>
  </div>
  
</div>

@if (currentScore() > 0) {
  <div class="reset-score">
    <button (click)="resetSession()">Reset score</button>
  </div>
}

<app-choice-buttons (SelectedChoice)="play($event)"></app-choice-buttons>
