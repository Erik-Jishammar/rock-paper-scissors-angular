<div class="form-wrapper">
  <form class="form-container" [formGroup]="loginForm" (submit)="login(); $event.preventDefault()">
    <h2>Login</h2>
    <label for="username">Username</label>
    <input type="text" id="username" placeholder="Enter your username..." formControlName="username" required>
    <button type="submit" [disabled]="loginForm.invalid">Let's Play</button>
  </form>
</div>
