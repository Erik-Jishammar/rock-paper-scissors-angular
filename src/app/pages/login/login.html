<article>
    <h2>Logga in</h2>
    <form [formGroup]="loginForm" (submit)="login(); $event.preventDefault()">
        <label for="username">Användarnamn</label>
        <input type="text" id="username" formControlName="username" required >
        <button type="submit" [disabled]="loginForm.invalid">Logga in</button>
       
    </form>
</article>
